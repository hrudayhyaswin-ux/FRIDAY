name: FRIDAY CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies & Lint
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run lint || true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Linting Tools & Check Syntax
      run: |
        cd backend
        pip install flake8
        # Stop on syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Backend Docker Image
      run: |
        cd backend
        docker build -t friday-backend:latest .

    - name: Build Frontend Docker Image
      run: |
        cd frontend
        docker build -t friday-frontend:latest .
