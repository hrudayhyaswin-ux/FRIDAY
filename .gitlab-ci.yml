stages:
  - commit-lint
  - lint-python
  - lint-frontend
  - type-check
  - security
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  NPM_CACHE_DIR: "$CI_PROJECT_DIR/.npm-cache"
  RUFF_CACHE_DIR: "$CI_PROJECT_DIR/.ruff-cache"
  MYPY_CACHE_DIR: "$CI_PROJECT_DIR/.mypy-cache"

cache:
  key: "$CI_JOB_STAGE-$CI_COMMIT_REF_SLUG"
  paths:
    - .pip-cache/
    - .npm-cache/
    - .ruff-cache/
    - .mypy-cache/
    - frontend/node_modules/

# ---------------------------------------------------------------------------
# Stage: commit-lint
# ---------------------------------------------------------------------------

commit-lint:
  stage: commit-lint
  image: python:3.13-slim
  before_script:
    - pip install --quiet commitlint-ai 2>/dev/null || pip install --quiet pydantic click 2>/dev/null
  script:
    - |
      if [ -n "$CI_COMMIT_TITLE" ]; then
        echo "Validating commit message: $CI_COMMIT_TITLE"
        echo "$CI_COMMIT_TITLE" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'
      else
        echo "No CI_COMMIT_TITLE — checking recent commit instead"
        git log -1 --pretty=%B | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'
      fi && echo "Commit message follows conventional commits" || { echo "ERROR: Commit message must follow Conventional Commits format: type(scope): description"; exit 1; }

# ---------------------------------------------------------------------------
# Stage: lint-python
# ---------------------------------------------------------------------------

backend-ruff-lint:
  stage: lint-python
  image: python:3.13-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check backend/
  cache:
    key: "$CI_JOB_STAGE-$CI_COMMIT_REF_SLUG"
    paths:
      - .ruff-cache/
      - .pip-cache/

backend-ruff-format:
  stage: lint-python
  image: python:3.13-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff format --check backend/

# ---------------------------------------------------------------------------
# Stage: lint-frontend
# ---------------------------------------------------------------------------

.frontend-base: &frontend-base
  image: node:20-alpine
  cache:
    key: "$CI_JOB_STAGE-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
      - .npm-cache/
  before_script:
    - cd frontend && npm install --legacy-peer-deps

frontend-eslint:
  <<: *frontend-base
  stage: lint-frontend
  script:
    - npm run lint

frontend-format-check:
  <<: *frontend-base
  stage: lint-frontend
  script:
    - npx prettier --check "app/**/*.{ts,tsx}" "components/**/*.{ts,tsx}"

# ---------------------------------------------------------------------------
# Stage: type-check
# ---------------------------------------------------------------------------

backend-mypy:
  stage: type-check
  image: python:3.13-slim
  before_script:
    - pip install --quiet mypy fastapi pydantic uvicorn ollama
  script:
    - mypy backend/ --cache-dir .mypy-cache
  cache:
    key: "$CI_JOB_STAGE-$CI_COMMIT_REF_SLUG"
    paths:
      - .mypy-cache/
      - .pip-cache/

frontend-tsc:
  <<: *frontend-base
  stage: type-check
  script:
    - npx tsc --noEmit

# ---------------------------------------------------------------------------
# Stage: security
# ---------------------------------------------------------------------------

backend-bandit:
  stage: security
  image: python:3.13-slim
  before_script:
    - pip install --quiet bandit
  script:
    - bandit -r backend/api backend/ai backend/core backend/database backend/memory backend/plugins backend/speech backend/tts -c pyproject.toml
  allow_failure: true

secrets-detection:
  stage: security
  image: python:3.13-slim
  before_script:
    - apt-get update && apt-get install -y git 2>/dev/null
    - pip install --quiet detect-secrets
  script:
    - detect-secrets scan --baseline .secrets.baseline --exclude-files 'package-lock\.json|\.git/|node_modules/|venv/|__pycache__/|\.next/|\.pytest_cache/|frontend/'
  allow_failure: true

dependency-audit:
  stage: security
  image: python:3.13-slim
  before_script:
    - apt-get update && apt-get install -y nodejs npm 2>/dev/null
    - pip install --quiet safety
  script:
    - safety check --full-report -r backend/requirements.txt
    - cd frontend && npm audit --audit-level=high
  allow_failure: true

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------

backend-pytest:
  stage: test
  image: python:3.13-slim
  before_script:
    - apt-get update && apt-get install -y ffmpeg build-essential 2>/dev/null
    - pip install --quiet -r backend/requirements.txt pytest pytest-cov httpx
  script:
    - cd backend && python3 -m pytest ../tests/ -v --cov=. --cov-report=term --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.xml
    when: always

# ---------------------------------------------------------------------------
# Stage: build
# ---------------------------------------------------------------------------

.docker-base: &docker-base
  image: docker:20.10.16
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info > /dev/null 2>&1 || { echo "ERROR: Docker daemon unreachable at tcp://docker:2375"; exit 1; }
    - if [ -z "$CI_REGISTRY_IMAGE" ]; then export CI_REGISTRY_IMAGE="friday" && echo "CI_REGISTRY_IMAGE not set — using local tag 'friday'"; fi

build-backend-docker:
  <<: *docker-base
  stage: build
  script:
    - cd backend && docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" .

build-frontend-docker:
  <<: *docker-base
  stage: build
  script:
    - cd frontend && docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" .
