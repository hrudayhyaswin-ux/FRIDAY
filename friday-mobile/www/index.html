<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FRIDAY AI — Personal Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cyan: #06b6d4;
            --cyan-dim: rgba(6,182,212,0.15);
            --cyan-glow: 0 0 20px #06b6d4, 0 0 40px rgba(6,182,212,0.4);
            --indigo: #6366f1;
            --bg: #000408;
            --surface: rgba(6,182,212,0.04);
            --border: rgba(6,182,212,0.18);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --red: #ef4444;
            --green: #10b981;
        }

        html, body {
            height: 100%; width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 999; pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
        }

        canvas#bg { position: fixed; inset: 0; z-index: 0; }

        .app {
            position: relative; z-index: 1;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,4,8,0.8);
            backdrop-filter: blur(10px);
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 18px; font-weight: 900;
            color: var(--cyan);
            text-shadow: var(--cyan-glow);
            letter-spacing: 4px;
        }
        .brand span { font-size: 10px; color: var(--text-dim); }

        .status-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 10px; color: var(--text-dim);
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
        .dot.pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── HOLOGRAM CORE ── */
        .core-section {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0 12px;
            position: relative;
        }

        .hologram-ring-wrap {
            position: relative;
            width: 160px; height: 160px;
            cursor: pointer;
        }

        .hologram-ring-wrap svg {
            position: absolute; inset: 0;
            animation: spin-slow 12s linear infinite;
        }
        .hologram-ring-wrap svg.reverse { animation: spin-slow-reverse 8s linear infinite; }

        @keyframes spin-slow { to { transform: rotate(360deg); } }
        @keyframes spin-slow-reverse { to { transform: rotate(-360deg); } }

        .core-orb {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(6,182,212,0.5), rgba(6,182,212,0.05) 60%, transparent);
            border: 2px solid rgba(6,182,212,0.6);
            box-shadow: 0 0 30px rgba(6,182,212,0.4), inset 0 0 20px rgba(6,182,212,0.2);
            transition: all 0.3s ease;
        }
        .core-orb.speaking {
            box-shadow: 0 0 60px rgba(6,182,212,0.9), inset 0 0 30px rgba(6,182,212,0.4);
            animation: orb-pulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes orb-pulse {
            from { transform: translate(-50%,-50%) scale(1); }
            to   { transform: translate(-50%,-50%) scale(1.12); }
        }

        .core-label {
            font-family: 'Orbitron', monospace;
            font-size: 9px; letter-spacing: 2px;
            color: var(--text-dim); margin-top: 10px;
            text-transform: uppercase;
        }
        .core-label.active { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

        .tap-hint {
            font-size: 10px; color: var(--text-dim);
            margin-top: 4px;
            animation: blink 2.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

        /* ── TERMINAL ── */
        .terminal-section {
            flex: 1; overflow: hidden;
            display: flex; flex-direction: column;
            margin: 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(0,4,8,0.6);
            backdrop-filter: blur(8px);
        }

        .terminal-topbar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 10px; color: var(--text-dim);
        }
        .t-dot { width: 8px; height: 8px; border-radius: 50%; }

        #chat-log {
            flex: 1; overflow-y: auto;
            padding: 10px;
            display: flex; flex-direction: column; gap: 6px;
            scroll-behavior: smooth;
        }
        #chat-log::-webkit-scrollbar { width: 2px; }
        #chat-log::-webkit-scrollbar-thumb { background: var(--border); }

        .msg { font-size: 12px; line-height: 1.5; padding: 6px 8px; border-radius: 6px; }
        .msg.friday {
            color: var(--cyan);
            border-left: 2px solid rgba(6,182,212,0.5);
            background: rgba(6,182,212,0.05);
        }
        .msg.friday::before { content: 'FRIDAY > '; font-weight: bold; }
        .msg.user {
            color: var(--text);
            border-left: 2px solid rgba(255,255,255,0.15);
            align-self: flex-end; text-align: right;
        }
        .msg.user::before { content: 'YOU > '; color: var(--text-dim); }
        .msg.system { color: var(--text-dim); font-size: 10px; font-style: italic; }

        /* ── INPUT BAR ── */
        .input-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            background: rgba(0,4,8,0.9);
        }

        #user-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 8px 10px;
            outline: none;
            caret-color: var(--cyan);
        }
        #user-input:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(6,182,212,0.3); }
        #user-input::placeholder { color: var(--text-dim); }

        .icon-btn {
            width: 38px; height: 38px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--cyan);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:active { transform: scale(0.92); background: var(--cyan-dim); }
        .icon-btn.mic-active { background: rgba(239,68,68,0.2); border-color: var(--red); color: var(--red); }

        /* ── BOTTOM STATUS BAR ── */
        .status-bar {
            display: flex; justify-content: space-around; align-items: center;
            padding: 6px 12px 10px;
            font-size: 9px; color: var(--text-dim); letter-spacing: 1px;
        }
        .status-bar span { display: flex; align-items: center; gap: 4px; }

        /* ── MODE BADGE ── */
        .mode-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.4);
            color: var(--indigo);
            font-size: 9px; padding: 2px 8px; border-radius: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="app">

    <header>
        <div>
            <div class="brand">FRIDAY <span>v1.0</span></div>
        </div>
        <div class="status-pill">
            <div class="dot pulse"></div>
            <span>OFFLINE MODE</span>
        </div>
    </header>

    <div class="core-section">
        <div class="mode-badge">🔒 STANDALONE</div>
        <div class="hologram-ring-wrap" id="hologram" title="Tap to activate FRIDAY">

            <!-- Outer ring -->
            <svg viewBox="0 0 160 160" width="160" height="160">
                <circle cx="80" cy="80" r="74" fill="none" stroke="rgba(6,182,212,0.25)" stroke-width="1"
                    stroke-dasharray="8 4"/>
                <circle cx="80" cy="80" r="74" fill="none" stroke="rgba(6,182,212,0.6)" stroke-width="1.5"
                    stroke-dasharray="30 100" stroke-linecap="round"/>
            </svg>

            <!-- Inner ring -->
            <svg class="reverse" viewBox="0 0 160 160" width="160" height="160" style="position:absolute;inset:0;">
                <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1"
                    stroke-dasharray="5 8"/>
                <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(99,102,241,0.7)" stroke-width="1"
                    stroke-dasharray="20 80" stroke-linecap="round"/>
            </svg>

            <div class="core-orb" id="orb"></div>
        </div>

        <div class="core-label" id="core-label">SECURE INTELLIGENCE</div>
        <div class="tap-hint" id="tap-hint">TAP HOLOGRAM TO ACTIVATE</div>
    </div>

    <div class="terminal-section">
        <div class="terminal-topbar">
            <div class="t-dot" style="background:#ef4444;"></div>
            <div class="t-dot" style="background:#f59e0b;"></div>
            <div class="t-dot" style="background:#10b981;"></div>
            <span style="margin-left:4px;">FRIDAY_NEURAL_TERMINAL — OFFLINE CORE</span>
        </div>
        <div id="chat-log"></div>
    </div>

    <div class="input-bar">
        <button class="icon-btn" id="mic-btn" title="Voice input">🎙️</button>
        <input id="user-input" type="text" placeholder="Ask FRIDAY anything..." autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="icon-btn" id="send-btn" title="Send">⚡</button>
        <button class="icon-btn" id="stop-btn" title="Stop speech">⏹️</button>
    </div>

    <div class="status-bar">
        <span>⚡ CPU: <b id="cpu-val">34%</b></span>
        <span>🧠 MEM: <b id="mem-val">52%</b></span>
        <span>🔒 OFFLINE</span>
        <span>🎙️ STT: READY</span>
    </div>

</div>

<script>
// ─────────────────────────────────────────────
//  FRIDAY Mobile — Offline Intelligence Core
// ─────────────────────────────────────────────

const orb = document.getElementById('orb');
const coreLabel = document.getElementById('core-label');
const tapHint = document.getElementById('tap-hint');
const chatLog = document.getElementById('chat-log');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const micBtn = document.getElementById('mic-btn');

let isSpeechInterrupted = false;
let hasGreeted = false;

// ── Canvas neural network background ──
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, nodes = [];

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 40; i++) nodes.push({
    x: Math.random() * 1000, y: Math.random() * 2000,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5
});

function drawBg() {
    ctx.clearRect(0, 0, W, H);
    nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
    });
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < 120) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(6,182,212,${0.12 * (1 - d/120)})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
            }
        }
        ctx.beginPath();
        ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(6,182,212,0.5)';
        ctx.fill();
    }
    requestAnimationFrame(drawBg);
}
drawBg();

// ── System metrics simulation ──
setInterval(() => {
    document.getElementById('cpu-val').textContent = (Math.random()*20+28).toFixed(0)+'%';
    document.getElementById('mem-val').textContent = (Math.random()*10+48).toFixed(0)+'%';
}, 3000);

// ── Offline AI Knowledge Base ──
const responses = {
    greet: [
        "Hello Boss, welcome to FRIDAY — your personal AI assistant. All systems are online. I am one command away.",
        "Good to see you, Boss. FRIDAY is fully operational in offline mode. All core functions are ready."
    ],
    time: () => `Current time is ${new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})}. Date: ${new Date().toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}.`,
    who: "I am FRIDAY — Fully Responsive Intelligence Digital Assistant for You. Designed to serve as your offline personal AI system.",
    features: "I can answer questions, provide system status, assist with information, and process voice commands — all completely offline.",
    offline: "Affirmative. I operate entirely offline. No internet connection required. All intelligence is built in.",
    battery: "Battery monitoring is active. Your device status is being tracked by the system.",
    weather: "I am in offline mode. Weather data requires network access. Please check your weather app for current conditions.",
    help: "Available commands: time, date, status, features, about, who are you, clear. You can also ask me general knowledge questions.",
    status: "All FRIDAY subsystems are nominal. Neural core: ACTIVE. Voice engine: READY. Memory core: LOADED. Threat level: ZERO.",
    creator: "I was created by your developer — an advanced offline AI system inspired by the JARVIS concept from Iron Man.",
    joke: ["Why don't scientists trust atoms? Because they make up everything.", "I would tell you a joke about time travel — but you didn't laugh.", "Parallel lines have so much in common. It's a shame they'll never meet."],
    capital: { india: "New Delhi", usa: "Washington D.C.", uk: "London", france: "Paris", japan: "Tokyo", china: "Beijing", germany: "Berlin", australia: "Canberra" },
    math: "I can handle basic computation. Please state the calculation clearly.",
    thanks: "You're welcome, Boss. Always at your service.",
    bye: "Standby mode activated. Call me anytime, Boss.",
};

function getOfflineReply(input) {
    const q = input.toLowerCase().trim();

    if (q.includes('time') || q.includes('date')) return responses.time();
    if (q.includes('who are you') || q.includes('what are you') || q.includes('your name')) return responses.who;
    if (q.includes('feature') || q.includes('what can') || q.includes('help me')) return responses.features;
    if (q.includes('offline') || q.includes('internet') || q.includes('network')) return responses.offline;
    if (q.includes('weather')) return responses.weather;
    if (q.includes('status') || q.includes('system')) return responses.status;
    if (q.includes('help') || q.includes('command')) return responses.help;
    if (q.includes('creat') || q.includes('made') || q.includes('built') || q.includes('develop')) return responses.creator;
    if (q.includes('joke') || q.includes('funny')) return responses.joke[Math.floor(Math.random()*responses.joke.length)];
    if (q.includes('thank')) return responses.thanks;
    if (q.includes('bye') || q.includes('goodbye') || q.includes('exit')) return responses.bye;
    if (q.includes('battery')) return responses.battery;
    if (q.includes('friday')) return "FRIDAY online and fully operational, Boss. What do you need?";
    if (q.includes('iron man') || q.includes('jarvis') || q.includes('tony')) return "JARVIS was the original. I am FRIDAY — next generation. At your service, Boss.";

    // Capital cities
    for (const [country, cap] of Object.entries(responses.capital)) {
        if (q.includes(country)) return `The capital of ${country.charAt(0).toUpperCase()+country.slice(1)} is ${cap}.`;
    }

    // Math
    const mathMatch = q.match(/(\d+)\s*([+\-\*\/x])\s*(\d+)/);
    if (mathMatch) {
        const a = parseFloat(mathMatch[1]), op = mathMatch[2], b = parseFloat(mathMatch[3]);
        let result;
        if (op === '+') result = a + b;
        else if (op === '-') result = a - b;
        else if (op === '*' || op === 'x') result = a * b;
        else if (op === '/') result = b !== 0 ? (a/b).toFixed(4) : 'undefined (division by zero)';
        return `The result is ${result}, Boss.`;
    }

    // Greetings
    if (/^(hi|hello|hey|good\s*(morning|evening|afternoon|night))/.test(q)) {
        return "Hello Boss. FRIDAY is online and ready. What can I do for you?";
    }

    // Fallback
    const fallbacks = [
        "I am in offline mode, Boss. My knowledge base covers general queries. Please be more specific.",
        "Understood. However, I require network access for that specific query. Try asking something else.",
        "Processing complete. That query falls outside my offline knowledge base. Try: time, status, features, or jokes.",
        "Running local inference... Insufficient offline data for that query. Ask me about system status or general knowledge."
    ];
    return fallbacks[Math.floor(Math.random()*fallbacks.length)];
}

// ── Add message to chat ──
function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
    return div;
}

// ── TTS — JARVIS style ──
function speak(text) {
    if (!('speechSynthesis' in window) || isSpeechInterrupted) return;
    window.speechSynthesis.cancel();

    const clean = text.replace(/[*#_`>|]/g, '').trim();
    if (!clean) return;

    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.12; u.pitch = 0.82; u.volume = 1.0;

    const voices = window.speechSynthesis.getVoices();
    const jarvis = voices.find(v =>
        v.name.includes('Daniel') || v.name.includes('Alex') ||
        v.name.includes('Google UK English Male') ||
        v.name.includes('Google US English') || v.name.includes('Fred')
    ) || voices.find(v => !v.name.toLowerCase().includes('female') && v.lang.startsWith('en'));
    if (jarvis) u.voice = jarvis;

    u.onstart = () => { orb.classList.add('speaking'); coreLabel.textContent = 'TRANSMITTING'; coreLabel.className = 'core-label active'; };
    u.onend = u.onerror = () => { orb.classList.remove('speaking'); coreLabel.textContent = 'SECURE INTELLIGENCE'; coreLabel.className = 'core-label'; };

    window.speechSynthesis.speak(u);
}

// Warm up voices
if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ── Stop speech ──
function stopSpeech() {
    isSpeechInterrupted = true;
    window.speechSynthesis && window.speechSynthesis.cancel();
    orb.classList.remove('speaking');
    coreLabel.textContent = 'SECURE INTELLIGENCE';
    coreLabel.className = 'core-label';
}

// ── Process user query ──
function processQuery(query) {
    if (!query.trim()) return;
    isSpeechInterrupted = false;

    addMsg(query, 'user');
    coreLabel.textContent = 'PROCESSING'; coreLabel.className = 'core-label active';

    setTimeout(() => {
        const reply = getOfflineReply(query);
        addMsg(reply, 'friday');
        speak(reply);
    }, 400);
}

// ── Hologram tap ──
document.getElementById('hologram').addEventListener('click', () => {
    if (window.speechSynthesis && window.speechSynthesis.speaking) {
        stopSpeech();
        return;
    }
    isSpeechInterrupted = false;
    if (!hasGreeted) {
        hasGreeted = true;
        tapHint.style.display = 'none';
        const greeting = responses.greet[0];
        addMsg(greeting, 'friday');
        speak(greeting);
    } else {
        const reply = "FRIDAY online. Awaiting your command, Boss.";
        addMsg(reply, 'friday');
        speak(reply);
    }
});

// ── Send button ──
sendBtn.addEventListener('click', () => {
    const val = userInput.value.trim();
    if (!val) return;
    userInput.value = '';
    processQuery(val);
});

// ── Enter key ──
userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const val = userInput.value.trim();
        if (!val) return;
        userInput.value = '';
        processQuery(val);
    }
});

// ── Stop button ──
stopBtn.addEventListener('click', () => {
    stopSpeech();
    addMsg('[Speech interrupted by user]', 'system');
});

// ── Escape key ──
window.addEventListener('keydown', e => {
    if (e.key === 'Escape') stopSpeech();
});

// ── Voice recognition ──
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, listening = false;

if (SR) {
    recog = new SR();
    recog.continuous = false; recog.interimResults = false; recog.lang = 'en-US';

    recog.onresult = e => {
        const transcript = e.results[0][0].transcript;
        userInput.value = transcript;
        micBtn.classList.remove('mic-active');
        micBtn.textContent = '🎙️';
        listening = false;
        processQuery(transcript);
    };

    recog.onend = recog.onerror = () => {
        listening = false;
        micBtn.classList.remove('mic-active');
        micBtn.textContent = '🎙️';
    };

    micBtn.addEventListener('click', async () => {
        if (listening) { recog.stop(); return; }
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            recog.start();
            listening = true;
            micBtn.classList.add('mic-active');
            micBtn.textContent = '⏹️';
            isSpeechInterrupted = false;
        } catch(e) {
            addMsg('Microphone access denied. Please allow microphone permission.', 'system');
        }
    });
} else {
    micBtn.style.opacity = '0.3';
    micBtn.title = 'Voice not supported on this browser';
}

// ── Boot messages ──
setTimeout(() => addMsg('FRIDAY Neural Core initializing...', 'system'), 300);
setTimeout(() => addMsg('Offline intelligence module loaded.', 'system'), 700);
setTimeout(() => addMsg('Voice synthesis engine ready.', 'system'), 1100);
setTimeout(() => addMsg('All systems nominal. Tap the hologram to begin.', 'system'), 1500);
</script>
</body>
</html>
