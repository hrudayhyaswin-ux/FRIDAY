version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Allows backend container to securely resolve and talk to host machine's native Ollama GPU engine
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persistent storage for RAG documents and SQLite database
      - friday_data:/tmp/friday_stt
      - ./backend/friday_memory.db:/app/friday_memory.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Sets API base endpoint for the frontend dashboard
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  friday_data:
